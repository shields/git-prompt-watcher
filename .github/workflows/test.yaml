name: Test

on:
  push:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-26]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        if: runner.os == 'Linux'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and run tests in Docker (Linux)
        if: runner.os == 'Linux'
        run: |
          docker build -t git-prompt-watcher-test -f tests/Dockerfile .
          docker run --rm git-prompt-watcher-test

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install fswatch just uv starship

      - name: Configure git (macOS)
        if: runner.os == 'macOS'
        run: git config --global init.defaultBranch main

      - name: Run tests natively (macOS)
        if: runner.os == 'macOS'
        run: just ci
