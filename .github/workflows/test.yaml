name: Test

on:
  push:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-26]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        if: runner.os == 'Linux'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and run tests in Docker (Linux)
        if: runner.os == 'Linux'
        run: |
          docker build -t git-prompt-watcher-test -f tests/Dockerfile .
          docker run --rm git-prompt-watcher-test

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install fswatch just uv starship

      - name: Configure git (macOS)
        if: runner.os == 'macOS'
        run: git config --global init.defaultBranch main

      - name: Run tests natively (macOS)
        if: runner.os == 'macOS'
        run: just ci
